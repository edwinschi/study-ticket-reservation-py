openCollection: 1.0.0
type: http-request
info:
  name: Create Ticket Type
  description: Creates quantity inventory for an event.
request:
  method: POST
  url: "{{baseURL}}/v1/events/{{eventID}}/ticket-types"
  headers:
    - name: Content-Type
      value: application/json
  body:
    mode: json
    raw: |
      {
        "name": "General Admission",
        "total_quantity": 1000
      }
