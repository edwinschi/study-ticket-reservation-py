openCollection: 1.0.0
type: http-request
info:
  name: Login
  description: Validates credentials and links the current visitor session when a cookie is present.
request:
  method: POST
  url: "{{baseURL}}/v1/auth/login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    mode: json
    raw: |
      {
        "email": "{{email}}",
        "password": "{{password}}"
      }
