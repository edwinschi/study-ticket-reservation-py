openCollection: 1.0.0
type: collection
info:
  name: Ticket Reservation Python Lab
  version: 1.0.0
  description: >
    Bruno OpenCollection for the Ticket Reservation Python Lab REST API.
    Requests are grouped by API domain and use environment variables instead of hardcoded hosts or secrets.
environments:
  - environments/local.yml
  - environments/staging.yml
folders:
  - name: health
    path: health
  - name: sessions
    path: sessions
  - name: auth
    path: auth
  - name: events
    path: events
  - name: reservations
    path: reservations
  - name: stress-admin
    path: stress-admin
