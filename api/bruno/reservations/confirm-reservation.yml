openCollection: 1.0.0
type: http-request
info:
  name: Confirm Reservation
  description: Requires the current session or linked user to own the reservation.
request:
  method: POST
  url: "{{baseURL}}/v1/reservations/{{reservationID}}/confirm"
  headers:
    - name: Authorization
      value: "Bearer {{token}}"
  body:
    mode: none
