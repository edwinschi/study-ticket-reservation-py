openCollection: 1.0.0
type: http-request
info:
  name: Reserve Quantity
  description: Requires a visitor_session cookie. Reserves quantity inventory using the current session.
request:
  method: POST
  url: "{{baseURL}}/v1/reservations/quantity"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "Bearer {{token}}"
  body:
    mode: json
    raw: |
      {
        "event_id": "{{eventID}}",
        "ticket_type_id": "{{ticketTypeID}}",
        "quantity": 2,
        "idempotency_key": "{{idempotencyKey}}"
      }
