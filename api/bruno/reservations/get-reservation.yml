openCollection: 1.0.0
type: http-request
info:
  name: Get Reservation
  description: Requires the current session or linked user to own the reservation.
request:
  method: GET
  url: "{{baseURL}}/v1/reservations/{{reservationID}}"
  headers:
    - name: Authorization
      value: "Bearer {{token}}"
  body:
    mode: none
